name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build app
        run: pyinstaller codex-session-manager.spec

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path dist/codex-session-manager.exe, run.bat, run-mobile.bat, mobile_portal.py, README.md, assets -DestinationPath release/codex-session-manager-windows-x64.zip -Force

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          cp dist/codex-session-manager release/codex-session-manager-macos-arm64
          chmod +x release/codex-session-manager-macos-arm64
          cd release
          zip -r codex-session-manager-macos-arm64.zip codex-session-manager-macos-arm64 ../README.md ../assets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-session-manager-${{ runner.os }}
          path: release/*.zip

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
